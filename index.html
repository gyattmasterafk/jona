<html lang="en">
<head>
<meta charset="utf-8">
<title>DOOM</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; color: #ffd27a; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; image-rendering: pixelated; }
  canvas { display: block; background: #000; border: 4px solid #2a0a0a; box-shadow: 0 0 60px rgba(200,30,10,0.4); cursor: crosshair; width: min(100vw, 1280px); height: min(100vh, 800px); }
  canvas.playing { cursor: none; }
  #hud { position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 24px; background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0)); pointer-events: none; text-shadow: 0 0 6px rgba(0,0,0,0.9); }
  #hud .row { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
  .stat { display: flex; flex-direction: column; }
  .stat .lbl { font-size: 10px; letter-spacing: 0.2em; opacity: 0.8; }
  .stat .val { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }
  .stat .max { font-size: 12px; opacity: 0.6; }
  #weaponBar { display: flex; gap: 6px; }
  .wslot { padding: 4px 8px; border-radius: 3px; min-width: 64px; text-align: center; border: 1px solid rgba(255,210,122,0.25); background: rgba(0,0,0,0.4); opacity: 0.35; }
  .wslot.owned { opacity: 1; }
  .wslot.active { border: 2px solid #e83a1c; background: rgba(232,58,28,0.18); }
  .wslot .k { font-size: 10px; opacity: 0.7; }
  .wslot .nm { font-size: 10px; font-weight: bold; color: #a89060; }
  .wslot.active .nm { color: #ffd27a; }
  .wslot .ammo { font-size: 12px; color: #7a6648; font-variant-numeric: tabular-nums; }
  .wslot.owned .ammo { color: #ffd27a; }
  #banner { position: absolute; top: 0; right: 0; padding: 8px 16px; text-align: right; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0)); text-shadow: 0 0 6px rgba(0,0,0,0.9); }
  #banner .lvl { font-size: 11px; opacity: 0.7; }
  #banner .name { font-size: 14px; font-weight: bold; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(ellipse at center, rgba(40,5,5,0.7), rgba(0,0,0,0.95)); }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: clamp(40px, 10vw, 120px); font-weight: 900; margin: 0; color: #e83a1c; text-shadow: 0 0 30px rgba(232,58,28,0.6), 4px 4px 0 #1a0000; letter-spacing: 0.15em; }
  #overlay .sub { margin-top: 20px; font-size: 16px; max-width: 520px; padding: 0 16px; opacity: 0.9; }
  #overlay .ctrls { margin-top: 32px; font-size: 13px; line-height: 1.7; opacity: 0.8; }
  #overlay .ctrls .note { margin-top: 14px; opacity: 0.7; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="cv" width="640" height="400"></canvas>
    <div id="banner">
      <div class="lvl">LEVEL <span id="lvlNum">1</span> / 10</div>
      <div class="name" id="lvlName">E1M1: Hangar</div>
    </div>
    <div id="hud">
      <div class="row">
        <div class="stat"><div class="lbl">HEALTH</div><div class="val" id="hp" style="color:#e83a1c">100<span class="max"> / 100</span></div></div>
        <div class="stat"><div class="lbl">AMMO</div><div class="val" id="ammoVal">30</div></div>
        <div id="weaponBar"></div>
        <div class="stat"><div class="lbl">KILLS</div><div class="val" id="kills" style="color:#f5a85c">0<span class="max" id="killMax"> / 0</span></div></div>
        <div class="stat" style="align-items:flex-end"><div class="lbl">SCORE</div><div class="val" id="score">00000</div></div>
      </div>
    </div>
    <div id="overlay">
      <h1 id="oTitle">DOOM</h1>
      <div class="sub" id="oSub">Press CLICK or ENTER to enter Hell</div>
      <div class="ctrls" id="oCtrls">
        <div>WASD / ARROWS — move &amp; turn</div>
        <div>MOUSE — look (click to lock cursor)</div>
        <div>SPACE / CLICK — shoot</div>
        <div>1 2 3 4 / Q E / SCROLL — switch weapon</div>
        <div class="note">10 levels. Kill every demon, then reach the blue portal.</div>
      </div>
    </div>
  </div>
</div>

function parseMap(name, raw) {
  const h = raw.length, w = raw[0].length;
  const grid = [];
  let playerStart = {x: 1.5, y: 1.5};
  const enemySpawns = [], ammoSpawns = [], healthSpawns = [], weaponSpawns = [];
  let exit = {x: 1.5, y: 1.5};
  for (let y = 0; y < h; y++) {
    const row = [];
    for (let x = 0; x < w; x++) {
      const c = raw[y][x];
      const cx = x + 0.5, cy = y + 0.5;
      switch (c) {
        case "1": row.push(1); break;
        case "2": row.push(2); break;
        case "3": row.push(3); break;
        case "4": row.push(4); break;
        case "P": playerStart = {x: cx, y: cy}; row.push(0); break;
        case "E": enemySpawns.push({x: cx, y: cy}); row.push(0); break;
        case "A": ammoSpawns.push({x: cx, y: cy}); row.push(0); break;
        case "H": healthSpawns.push({x: cx, y: cy}); row.push(0); break;
        case "S": weaponSpawns.push({x: cx, y: cy, kind: "shotgun"}); row.push(0); break;
        case "C": weaponSpawns.push({x: cx, y: cy, kind: "chaingun"}); row.push(0); break;
        case "L": weaponSpawns.push({x: cx, y: cy, kind: "plasma"}); row.push(0); break;
        case "X": exit = {x: cx, y: cy}; row.push(0); break;
        default: row.push(0);
      }
    }
    grid.push(row);
  }
  return {grid, width: w, height: h, playerStart, enemySpawns, ammoSpawns, healthSpawns, weaponSpawns, exit, name};
}
const MAPS = RAW_MAPS.map(([n, r]) => parseMap(n, r));
const TOTAL_LEVELS = MAPS.length;

// ============================================================
// TEXTURES (procedural)
// ============================================================
const TEX = 64;
function rgba(r, g, b, a=255) { return ((a&255)<<24) | ((b&255)<<16) | ((g&255)<<8) | (r&255); }

function makeStone() {
  const d = new Uint32Array(TEX*TEX);
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    const n = (Math.sin(x*0.4)+Math.cos(y*0.3))*8 + (Math.random()*16-8);
    const base = 110 + n;
    d[y*TEX+x] = rgba(base, base*0.92, base*0.78);
  }
  // mortar lines
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    if ((y%16===0) || (x%16===0 && (y%32<16))) d[y*TEX+x] = rgba(60, 50, 40);
  }
  return {size: TEX, data: d};
}
function makeBrick() {
  const d = new Uint32Array(TEX*TEX);
  for (let i = 0; i < TEX*TEX; i++) {
    const v = 130 + Math.random()*30 - 15;
    d[i] = rgba(v*1.0, v*0.45, v*0.3);
  }
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    const off = (Math.floor(y/16)%2)*16;
    if (y%16===0 || (x+off)%32===0) d[y*TEX+x] = rgba(40, 18, 12);
  }
  return {size: TEX, data: d};
}
function makeMetal() {
  const d = new Uint32Array(TEX*TEX);
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    const v = 90 + Math.sin(x*0.6+y*0.3)*15 + Math.random()*10;
    d[y*TEX+x] = rgba(v*0.85, v*0.9, v*1.1);
  }
  for (let y = 4; y < TEX; y += 16) for (let x = 4; x < TEX; x += 16) {
    d[y*TEX+x] = rgba(40,40,55); d[y*TEX+x+1] = rgba(220,220,230);
  }
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    if (y%32===0 || x%32===0) d[y*TEX+x] = rgba(40,45,55);
  }
  return {size: TEX, data: d};
}
function makeHell() {
  const d = new Uint32Array(TEX*TEX);
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    const v = 90 + Math.sin(x*0.2)*Math.cos(y*0.25)*30 + Math.random()*20;
    d[y*TEX+x] = rgba(v*1.4, v*0.3, v*0.2);
  }
  // streaks
  for (let i = 0; i < 80; i++) {
    const x = (Math.random()*TEX)|0;
    const len = 5 + (Math.random()*20)|0;
    const ys = (Math.random()*(TEX-len))|0;
    for (let k = 0; k < len; k++) d[(ys+k)*TEX+x] = rgba(160, 20, 10);
  }
  return {size: TEX, data: d};
}
const WALL_TEX = [null, makeStone(), makeBrick(), makeMetal(), makeHell()];

const SPR = 64;
function makeImp() {
  const d = new Uint32Array(SPR*SPR); d.fill(0);
  // body
  for (let y = 24; y < 56; y++) for (let x = 18; x < 46; x++) {
    const n = Math.random()*30-15;
    d[y*SPR+x] = rgba(120+n, 50+n*0.5, 30+n*0.3);
  }
  // head
  for (let y = 8; y < 28; y++) for (let x = 22; x < 42; x++) {
    const dx = x-32, dy = y-18;
    if (dx*dx+dy*dy < 100) d[y*SPR+x] = rgba(140, 60, 35);
  }
  // eyes
  d[16*SPR+27] = rgba(255,220,80); d[16*SPR+28] = rgba(255,220,80);
  d[16*SPR+35] = rgba(255,220,80); d[16*SPR+36] = rgba(255,220,80);
  d[17*SPR+27] = rgba(255,255,140); d[17*SPR+36] = rgba(255,255,140);
  // mouth
  for (let x = 27; x <= 36; x++) d[24*SPR+x] = rgba(20,5,5);
  for (let x = 28; x < 36; x += 2) d[23*SPR+x] = rgba(240,240,240); // teeth
  // horns
  for (let k = 0; k < 5; k++) { d[(8-k)*SPR+24-k] = rgba(60,30,20); d[(8-k)*SPR+40+k] = rgba(60,30,20); }
  // arms
  for (let y = 28; y < 50; y++) {
    d[y*SPR+14] = rgba(120,50,30); d[y*SPR+15] = rgba(120,50,30);
    d[y*SPR+48] = rgba(120,50,30); d[y*SPR+49] = rgba(120,50,30);
  }
  // claws
  for (let k = 0; k < 3; k++) { d[50*SPR+12+k] = rgba(220,220,220); d[50*SPR+50+k] = rgba(220,220,220); }
  // legs
  for (let y = 50; y < 60; y++) {
    for (let x = 22; x < 28; x++) d[y*SPR+x] = rgba(110,45,28);
    for (let x = 36; x < 42; x++) d[y*SPR+x] = rgba(110,45,28);
  }
  return {size: SPR, data: d};
}
function makeAmmo() {
  const d = new Uint32Array(SPR*SPR); d.fill(0);
  for (let y = 28; y < 44; y++) for (let x = 18; x < 46; x++) d[y*SPR+x] = rgba(180,150,40);
  for (let x = 18; x < 46; x++) { d[28*SPR+x] = rgba(240,210,80); d[43*SPR+x] = rgba(110,90,20); }
  for (let y = 28; y < 44; y++) { d[y*SPR+18] = rgba(110,90,20); d[y*SPR+45] = rgba(110,90,20); }
  // bullets
  for (let i = 0; i < 4; i++) {
    const cx = 22 + i*6;
    for (let y = 22; y < 30; y++) d[y*SPR+cx] = rgba(220,200,120);
    d[21*SPR+cx] = rgba(255,240,160);
  }
  return {size: SPR, data: d};
}
function makeHealth() {
  const d = new Uint32Array(SPR*SPR); d.fill(0);
  for (let y = 26; y < 46; y++) for (let x = 22; x < 42; x++) d[y*SPR+x] = rgba(230,230,230);
  for (let x = 22; x < 42; x++) { d[26*SPR+x] = rgba(180,180,180); d[45*SPR+x] = rgba(140,140,140); }
  // red cross
  for (let y = 28; y < 44; y++) for (let x = 30; x < 34; x++) d[y*SPR+x] = rgba(220,40,30);
  for (let y = 32; y < 38; y++) for (let x = 24; x < 40; x++) d[y*SPR+x] = rgba(220,40,30);
  return {size: SPR, data: d};
}
function makeExit() {
  const d = new Uint32Array(SPR*SPR); d.fill(0);
  for (let y = 8; y < 60; y++) for (let x = 16; x < 48; x++) {
    const dx = x-32, dy = y-34;
    const r = Math.sqrt(dx*dx+dy*dy*0.7);
    if (r < 22) {
      const t = 1 - r/22;
      d[y*SPR+x] = rgba(80*t+20, 180*t+30, 255*t+40);
    }
  }
  for (let i = 0; i < 30; i++) {
    const a = Math.random()*Math.PI*2, r = Math.random()*18;
    const x = (32+Math.cos(a)*r)|0, y = (34+Math.sin(a)*r*0.7)|0;
    d[y*SPR+x] = rgba(220,240,255);
  }
  return {size: SPR, data: d};
}
function makeWeaponPickup(barrel, stock) {
  const d = new Uint32Array(SPR*SPR); d.fill(0);
  for (let y = 32; y < 46; y++) for (let x = 14; x < 30; x++) d[y*SPR+x] = rgba(stock[0],stock[1],stock[2]);
  for (let y = 28; y < 38; y++) for (let x = 24; x < 54; x++) d[y*SPR+x] = rgba(barrel[0],barrel[1],barrel[2]);
  for (let x = 24; x < 54; x++) d[28*SPR+x] = rgba(Math.min(255,barrel[0]+60), Math.min(255,barrel[1]+60), Math.min(255,barrel[2]+60));
  d[26*SPR+50] = rgba(40,40,40); d[26*SPR+51] = rgba(40,40,40);
  return {size: SPR, data: d};
}
const IMP_TEX = makeImp();
const AMMO_TEX = makeAmmo();
const HEALTH_TEX = makeHealth();
const EXIT_TEX = makeExit();
const SHOTGUN_PICKUP = makeWeaponPickup([90,90,100],[120,70,30]);
const CHAINGUN_PICKUP = makeWeaponPickup([60,60,70],[40,40,50]);
const PLASMA_PICKUP = makeWeaponPickup([60,180,220],[50,60,90]);

// ============================================================

let audioCtx = null;
function unlockAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } if (audioCtx && audioCtx.state === "suspended") audioCtx.resume(); }
function blip(freq, dur, type, vol) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "square";
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(vol||0.15, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0+dur);
}
function noise(dur, vol) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr*dur, sr);
  const dat = buf.getChannelData(0);
  for (let i = 0; i < dat.length; i++) dat[i] = (Math.random()*2-1) * (1 - i/dat.length);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = vol||0.2;
  src.connect(g).connect(audioCtx.destination); src.start(t0);
}
function playShot() { noise(0.12, 0.25); blip(180, 0.08, "square", 0.18); }
function playHit() { blip(140, 0.05, "sawtooth", 0.08); }
function playEnemyHit() { blip(220, 0.1, "square", 0.14); blip(120, 0.12, "sawtooth", 0.1); }
function playPickup() { blip(660, 0.08, "square", 0.18); blip(990, 0.1, "square", 0.14); }
function playEmpty() { blip(80, 0.05, "square", 0.1); }
function playPain() { blip(220, 0.18, "sawtooth", 0.18); blip(120, 0.22, "sawtooth", 0.12); }

// ENGINE
// ============================================================
const FOV = Math.PI/3;
const MAX_DEPTH = 24;
const MOVE_SPEED = 3.0;
const TURN_SPEED = 2.4;
const PLAYER_R = 0.22;
const W = 640, H = 400;

const WEAPON_ORDER = ["pistol","shotgun","chaingun","plasma"];
const WEAPONS = {
  pistol:   {name:"PISTOL",  cooldown:0.32, damage:22, pellets:1, spread:0.0,  range:12},
  shotgun:  {name:"SHOTGUN", cooldown:0.85, damage:14, pellets:7, spread:0.18, range:8},
  chaingun: {name:"CHAINGUN",cooldown:0.08, damage:14, pellets:1, spread:0.05, range:14},
  plasma:   {name:"PLASMA",  cooldown:0.16, damage:32, pellets:1, spread:0.0,  range:18},
};

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d", {alpha:false});
const img = ctx.createImageData(W, H);
const pixels = new Uint32Array(img.data.buffer);
const zBuf = new Float32Array(W);

const game = {
  status: "title",  // title | playing | dead | win | levelComplete
  level: 0,
  px: 0, py: 0, pa: 0,
  health: 100,
  ammo: {pistol:30, shotgun:0, chaingun:0, plasma:0},
  owned: {pistol:true, shotgun:false, chaingun:false, plasma:false},
  weapon: "pistol",
  score: 0,
  kills: 0,
  totalEnemies: 0,
  enemies: [],
  pickups: [],
  map: MAPS[0],
  muzzleFlash: 0,
  hitFlash: 0,
  shootCD: 0,
  bob: 0,
  weaponSwitch: 0,
};

function spawnEntities() {
  const m = game.map;
  game.enemies = m.enemySpawns.map(s => ({x:s.x, y:s.y, hp:30, alive:true, cooldown:0, hurt:0}));
  game.pickups = [
    ...m.ammoSpawns.map(s => ({x:s.x, y:s.y, kind:"ammo", taken:false})),
    ...m.healthSpawns.map(s => ({x:s.x, y:s.y, kind:"health", taken:false})),
    ...m.weaponSpawns.map(s => ({x:s.x, y:s.y, kind:s.kind, taken:false})),
    {x:m.exit.x, y:m.exit.y, kind:"exit", taken:false},
  ];
  game.totalEnemies = game.enemies.length;
  game.kills = 0;
}
function loadLevel(idx) {
  game.level = idx;
  game.map = MAPS[idx];
  game.px = game.map.playerStart.x; game.py = game.map.playerStart.y; game.pa = 0;
  spawnEntities();
}
function reset() {
  game.status = "playing";
  game.health = 100;
  game.ammo = {pistol:50, shotgun:0, chaingun:0, plasma:0};
  game.owned = {pistol:true, shotgun:false, chaingun:false, plasma:false};
  game.weapon = "pistol";
  game.score = 0;
  loadLevel(0);
}
function advanceLevel() {
  if (game.level + 1 >= TOTAL_LEVELS) { game.status = "win"; return; }
  loadLevel(game.level + 1);
  game.status = "playing";
  game.health = Math.min(100, game.health + 15);
}
function startGame() {
  if (game.status === "levelComplete") { advanceLevel(); return; }
  reset();
}
function switchWeapon(w) {
  if (!game.owned[w] || game.weapon === w) return;
  game.weapon = w;
  game.weaponSwitch = 1;
}
function cycleWeapon(dir) {
  const owned = WEAPON_ORDER.filter(w => game.owned[w]);
  if (owned.length <= 1) return;
  const idx = owned.indexOf(game.weapon);
  switchWeapon(owned[(idx + dir + owned.length) % owned.length]);
}
function isWall(x, y) {
  const m = game.map;
  if (x < 0 || y < 0 || x >= m.width || y >= m.height) return 1;
  return m.grid[y|0][x|0];
}
function tryMove(nx, ny) {
  if (isWall(nx + Math.sign(nx-game.px)*PLAYER_R, game.py) === 0) game.px = nx;
  if (isWall(game.px, ny + Math.sign(ny-game.py)*PLAYER_R) === 0) game.py = ny;
}
function hasLOS(x0, y0, x1, y1) {
  const dx = x1-x0, dy = y1-y0;
  const steps = Math.ceil(Math.hypot(dx,dy)*8);
  for (let i = 1; i < steps; i++) {
    const t = i/steps;
    if (isWall(x0+dx*t, y0+dy*t)) return false;
  }
  return true;
}

function fireWeapon(def) {
  let anyHit = false;
  for (let i = 0; i < def.pellets; i++) {
    const offset = def.pellets > 1 ? (i/(def.pellets-1)-0.5)*2*def.spread : (Math.random()-0.5)*def.spread;
    const ang = game.pa + offset;
    const cos = Math.cos(ang), sin = Math.sin(ang);
    let best = null, bestDist = Infinity;
    for (const e of game.enemies) {
      if (!e.alive) continue;
      const dx = e.x-game.px, dy = e.y-game.py;
      const dist = Math.hypot(dx,dy);
      if (dist > def.range) continue;
      const dot = (dx/dist)*cos + (dy/dist)*sin;
      const angOff = Math.acos(Math.min(1, Math.max(-1, dot)));
      const tol = Math.atan2(0.3, dist);
      if (angOff <= tol && hasLOS(game.px, game.py, e.x, e.y)) {
        if (dist < bestDist) { bestDist = dist; best = e; }
      }
    }
    if (best) {
      const dmg = def.damage + Math.floor(Math.random()*6);
      best.hp -= dmg; best.hurt = 1; anyHit = true;
      if (best.hp <= 0 && best.alive) { best.alive = false; game.kills++; game.score += 100; }
    }
  }
  if (anyHit) playEnemyHit(); else playHit();
}

function update(dt, input) {
  if (game.status !== "playing") return;
  if (input.left) game.pa -= TURN_SPEED * dt;
  if (input.right) game.pa += TURN_SPEED * dt;
  let mx = 0, my = 0;
  const cos = Math.cos(game.pa), sin = Math.sin(game.pa);
  if (input.forward) { mx += cos; my += sin; }
  if (input.back) { mx -= cos; my -= sin; }
  if (input.strafeLeft) { mx += sin; my -= cos; }
  if (input.strafeRight) { mx -= sin; my += cos; }
  const len = Math.hypot(mx, my);
  if (len > 0) {
    mx = mx/len * MOVE_SPEED * dt; my = my/len * MOVE_SPEED * dt;
    tryMove(game.px + mx, game.py + my);
    game.bob += dt * 8;
  }

  game.shootCD -= dt;
  game.muzzleFlash = Math.max(0, game.muzzleFlash - dt*6);
  game.hitFlash = Math.max(0, game.hitFlash - dt*3);
  game.weaponSwitch = Math.max(0, game.weaponSwitch - dt*4);

  if (input.shoot && game.shootCD <= 0 && game.weaponSwitch < 0.3) {
    const def = WEAPONS[game.weapon];
    game.shootCD = def.cooldown;
    if (game.ammo[game.weapon] > 0) {
      game.ammo[game.weapon]--;
      game.muzzleFlash = 1;
      playShot();
      fireWeapon(def);
    } else {
      playEmpty();
      if (game.weapon !== "pistol" && game.ammo.pistol > 0) switchWeapon("pistol");
    }
  }

  // Enemies
  for (const e of game.enemies) {
    if (!e.alive) continue;
    e.hurt = Math.max(0, e.hurt - dt*4);
    const dx = game.px - e.x, dy = game.py - e.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 12 && hasLOS(e.x, e.y, game.px, game.py)) {
      const dirX = dx/dist, dirY = dy/dist;
      if (dist > 0.9) {
        const speed = (1.2 + game.level*0.08) * dt;
        const nx = e.x + dirX*speed, ny = e.y + dirY*speed;
        if (isWall(nx, e.y) === 0) e.x = nx;
        if (isWall(e.x, ny) === 0) e.y = ny;
      }
      e.cooldown -= dt;
      if (dist < 1.4 && e.cooldown <= 0) {
        e.cooldown = 1.2;
        const dmg = 6 + Math.floor(game.level*0.8);
        game.health -= dmg; game.hitFlash = 1; playPain();
        if (game.health <= 0) { game.health = 0; game.status = "dead"; }
      }
    }
  }

  // Pickups
  for (const p of game.pickups) {
    if (p.taken) continue;
    const d = Math.hypot(p.x-game.px, p.y-game.py);
    if (d >= 0.5) continue;
    if (p.kind === "ammo") {
      p.taken = true;
      game.ammo.pistol += 12;
      if (game.owned.shotgun) game.ammo.shotgun += 4;
      if (game.owned.chaingun) game.ammo.chaingun += 25;
      if (game.owned.plasma) game.ammo.plasma += 15;
      game.score += 25; playPickup();
    } else if (p.kind === "health") {
      if (game.health < 100) { p.taken = true; game.health = Math.min(100, game.health + 25); game.score += 25; playPickup(); }
    } else if (p.kind === "shotgun" || p.kind === "chaingun" || p.kind === "plasma") {
      p.taken = true;
      const w = p.kind;
      const isNew = !game.owned[w];
      game.owned[w] = true;
      game.ammo[w] += w === "shotgun" ? 8 : w === "chaingun" ? 50 : 30;
      game.score += isNew ? 200 : 50;
      if (isNew) switchWeapon(w);
      playPickup();
    } else if (p.kind === "exit") {
      if (game.kills >= game.totalEnemies) {
        game.score += 500 + game.health*2;
        game.status = (game.level + 1 >= TOTAL_LEVELS) ? "win" : "levelComplete";
        playPickup();
      }
    }
  }
}

function drawSkyAndFloor() {
  const half = H/2 |0;
  const hellish = game.level >= 5;
  for (let y = 0; y < half; y++) {
    const t = y/half;
    const r = hellish ? (60+t*110)|0 : (40+t*70)|0;
    const g = hellish ? (5+t*20)|0 : (10+t*30)|0;
    const b = hellish ? (5+t*15)|0 : (10+t*20)|0;
    const c = (255<<24)|(b<<16)|(g<<8)|r;
    pixels.fill(c, y*W, y*W+W);
  }
  for (let y = half; y < H; y++) {
    const t = (y-half)/half;
    const r = hellish ? (45+t*70)|0 : (30+t*60)|0;
    const g = hellish ? (20+t*30)|0 : (28+t*55)|0;
    const b = hellish ? (15+t*20)|0 : (24+t*45)|0;
    const c = (255<<24)|(b<<16)|(g<<8)|r;
    pixels.fill(c, y*W, y*W+W);
  }
}

function castWalls() {
  const halfH = H/2;
  const m = game.map;
  for (let col = 0; col < W; col++) {
    const camX = (2*col)/W - 1;
    const ray = game.pa + Math.atan(camX * Math.tan(FOV/2));
    const rdx = Math.cos(ray), rdy = Math.sin(ray);
    let mapX = game.px|0, mapY = game.py|0;
    const ddx = Math.abs(1/rdx), ddy = Math.abs(1/rdy);
    let stepX, stepY, sdx, sdy;
    if (rdx < 0) { stepX = -1; sdx = (game.px - mapX) * ddx; }
    else { stepX = 1; sdx = (mapX + 1 - game.px) * ddx; }
    if (rdy < 0) { stepY = -1; sdy = (game.py - mapY) * ddy; }
    else { stepY = 1; sdy = (mapY + 1 - game.py) * ddy; }
    let hit = 0, side = 0, wallType = 0, dist = 0;
    while (!hit) {
      if (sdx < sdy) { sdx += ddx; mapX += stepX; side = 0; }
      else { sdy += ddy; mapY += stepY; side = 1; }
      if (mapX < 0 || mapY < 0 || mapX >= m.width || mapY >= m.height) { hit = 1; wallType = 1; dist = MAX_DEPTH; break; }
      const c = m.grid[mapY][mapX];
      if (c > 0) { hit = 1; wallType = c; }
    }
    dist = side === 0 ? sdx - ddx : sdy - ddy;
    dist *= Math.cos(ray - game.pa);
    zBuf[col] = dist;
    const lineH = Math.min(H*4, (H/Math.max(0.0001,dist))|0);
    const ds = Math.max(0, (-lineH/2 + halfH)|0);
    const de = Math.min(H-1, (lineH/2 + halfH)|0);
    const tex = WALL_TEX[wallType] || WALL_TEX[1];
    let wallX = side === 0 ? game.py + dist*rdy : game.px + dist*rdx;
    wallX -= Math.floor(wallX);
    let texX = (wallX * tex.size)|0;
    if (side === 0 && rdx > 0) texX = tex.size - texX - 1;
    if (side === 1 && rdy < 0) texX = tex.size - texX - 1;
    const step = tex.size / lineH;
    let texPos = (ds - halfH + lineH/2) * step;
    const shade = side === 1 ? 0.7 : 1.0;
    const fog = Math.max(0.15, 1 - dist/MAX_DEPTH);
    const intensity = shade * fog;
    for (let y = ds; y <= de; y++) {
      const texY = (texPos|0) & (tex.size-1);
      texPos += step;
      const c = tex.data[texY * tex.size + texX];
      const r = ((c & 0xff) * intensity)|0;
      const g = (((c >> 8) & 0xff) * intensity)|0;
      const b = (((c >> 16) & 0xff) * intensity)|0;
      pixels[y*W + col] = (255<<24)|(b<<16)|(g<<8)|r;
    }
  }
}

function drawSprites() {
  const sprites = [];
  for (const e of game.enemies) {
    if (!e.alive) continue;
    sprites.push({x:e.x, y:e.y, tex:IMP_TEX, tint: e.hurt > 0 ? 1.6 : 1, scale: 1});
  }
  for (const p of game.pickups) {
    if (p.taken) continue;
    let tex = null, scale = 0.6, tint = 1;
    if (p.kind === "ammo") tex = AMMO_TEX;
    else if (p.kind === "health") tex = HEALTH_TEX;
    else if (p.kind === "shotgun") { tex = SHOTGUN_PICKUP; scale = 0.7; }
    else if (p.kind === "chaingun") { tex = CHAINGUN_PICKUP; scale = 0.7; }
    else if (p.kind === "plasma") { tex = PLASMA_PICKUP; scale = 0.7; tint = 1.2; }
    else if (p.kind === "exit") {
      if (game.kills < game.totalEnemies) continue;
      tex = EXIT_TEX; scale = 1.2;
    }
    if (tex) sprites.push({x:p.x, y:p.y, tex, tint, scale});
  }
  sprites.sort((a,b)=>{
    const da = (a.x-game.px)**2 + (a.y-game.py)**2;
    const db = (b.x-game.px)**2 + (b.y-game.py)**2;
    return db - da;
  });
  const halfH = H/2, halfW = W/2;
  const planeLen = Math.tan(FOV/2);
  for (const s of sprites) {
    const sx = s.x - game.px, sy = s.y - game.py;
    const cos = Math.cos(-game.pa), sin = Math.sin(-game.pa);
    const camX = sx*cos - sy*sin;
    const camY = sx*sin + sy*cos;
    if (camX <= 0.05) continue;
    const screenX = halfW + (camY/camX/planeLen) * halfW;
    const sh = (H/camX) * s.scale;
    const sw = sh;
    const dsy = (-sh/2 + halfH)|0, dey = (sh/2 + halfH)|0;
    const dsx = (-sw/2 + screenX)|0, dex = (sw/2 + screenX)|0;
    const fog = Math.max(0.15, 1 - camX/MAX_DEPTH);
    const intensity = fog * s.tint;
    for (let stripe = Math.max(0,dsx); stripe < Math.min(W,dex); stripe++) {
      if (camX > zBuf[stripe]) continue;
      const texX = (((stripe - dsx) * s.tex.size) / sw)|0;
      for (let y = Math.max(0,dsy); y < Math.min(H,dey); y++) {
        const texY = (((y - dsy) * s.tex.size) / sh)|0;
        const c = s.tex.data[texY * s.tex.size + texX];
        if ((c >>> 24) === 0) continue;
        const r = Math.min(255, ((c & 0xff) * intensity)|0);
        const g = Math.min(255, (((c >> 8) & 0xff) * intensity)|0);
        const b = Math.min(255, (((c >> 16) & 0xff) * intensity)|0);
        pixels[y*W + stripe] = (255<<24)|(b<<16)|(g<<8)|r;
      }
    }
  }
}

function drawHand(c) {
  const grad = c.createLinearGradient(0, -40, 0, 40);
  grad.addColorStop(0, "#a37548"); grad.addColorStop(1, "#5a3a22");
  c.fillStyle = grad;
  c.beginPath(); c.moveTo(-80, 0); c.lineTo(80, 0); c.lineTo(70, 80); c.lineTo(-70, 80); c.closePath(); c.fill();
  c.strokeStyle = "#2c1810"; c.lineWidth = 2; c.stroke();
  c.fillStyle = "rgba(0,0,0,0.35)";
  for (let i = 0; i < 4; i++) c.fillRect(-30 + i*18, 6, 12, 6);
}

  c.fillStyle="#0d0d10"; c.beginPath(); c.ellipse(0,-24,22,14,0,0,Math.PI*2); c.fill();

  }

  c.fillStyle="#7afff0"; c.fillRect(-1,-113,2,2);
}
function drawShotgun(c) {

  const stock = c.createLinearGradient(-40,0,40,0);
  stock.addColorStop(0,"#3a2010"); stock.addColorStop(0.5,"#7a4a25"); stock.addColorStop(1,"#3a2010");
  c.fillStyle = stock;
  c.beginPath(); c.moveTo(-50,10); c.lineTo(50,10); c.lineTo(40,-40); c.lineTo(-40,-40); c.closePath(); c.fill();

  c.fillStyle="#2a1a0a"; c.fillRect(-50,-90,100,30);
  for (let i = -45; i <= 45; i += 8) { c.fillStyle="rgba(0,0,0,0.6)"; c.fillRect(i,-88,4,26); }
  const rec = c.createLinearGradient(0,-60,0,-30);
  rec.addColorStop(0,"#5a5a66"); rec.addColorStop(1,"#1a1a22");
  c.fillStyle = rec; c.fillRect(-45,-60,90,30);
  c.strokeStyle="#0a0a0e"; c.lineWidth=2; c.strokeRect(-45,-60,90,30);
  c.fillStyle="rgba(255,255,255,0.1)"; c.fillRect(-43,-58,86,3);
  c.fillStyle="#1a1a1a"; c.fillRect(-3,-30,6,12);
  c.fillStyle="#0d0d10"; c.beginPath(); c.ellipse(0,-28,16,10,0,0,Math.PI*2); c.fill();
  const barrel = c.createLinearGradient(-25,0,25,0);
  barrel.addColorStop(0,"#1a1a20"); barrel.addColorStop(0.5,"#4a4a55"); barrel.addColorStop(1,"#1a1a20");
  c.fillStyle = barrel;
  c.fillRect(-28,-170,22,110); c.fillRect(6,-170,22,110);
  c.strokeStyle="#0a0a0e"; c.lineWidth=2;
  c.strokeRect(-28,-170,22,110); c.strokeRect(6,-170,22,110);
  c.fillStyle="#000";
  c.beginPath(); c.ellipse(-17,-170,9,4,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(17,-170,9,4,0,0,Math.PI*2); c.fill();
  c.fillStyle="#ffd27a"; c.fillRect(-1,-165,2,3);
}
function drawChaingun(c) {
  drawHand(c);
  const body = c.createLinearGradient(0,-100,0,0);
  body.addColorStop(0,"#3a3a44"); body.addColorStop(1,"#1a1a22");
  c.fillStyle = body; c.fillRect(-55,-100,110,100);
  c.strokeStyle="#0a0a0e"; c.lineWidth=2; c.strokeRect(-55,-100,110,100);
  for (let i = 0; i < 6; i++) {
    c.fillStyle="rgba(0,0,0,0.7)";
    c.fillRect(-45+i*16,-90,10,4); c.fillRect(-45+i*16,-80,10,4);
  }
  c.fillStyle="#a07020"; c.fillRect(-70,-50,140,16);
  for (let i = -70; i < 70; i += 8) { c.fillStyle="#d4a040"; c.fillRect(i,-48,6,12); }
  const t = game.bob*0.5 + (game.muzzleFlash > 0 ? 1 : 0);
  for (let i = 0; i < 6; i++) {
    const ang = (i/6)*Math.PI*2 + t;
    const r = 18;
    const bx = Math.cos(ang)*r;
    const by = Math.sin(ang)*r*0.4 - 130;
    c.fillStyle="#2a2a32"; c.fillRect(bx-4, by, 8, 60);
    c.fillStyle="#1a1a22"; c.fillRect(bx-4, by, 8, 6);
  }
  c.fillStyle="#0a0a0e"; c.beginPath(); c.arc(0,-130,22,0,Math.PI*2); c.fill();
  c.fillStyle="#3a3a44"; c.beginPath(); c.arc(0,-130,16,0,Math.PI*2); c.fill();
  c.fillStyle="#0a0a0e"; c.beginPath(); c.arc(0,-130,6,0,Math.PI*2); c.fill();
  c.strokeStyle="#5a5a66"; c.lineWidth=3;
  c.beginPath(); c.arc(0,-130,28,0,Math.PI*2); c.stroke();
}
function drawPlasma(c) {
  drawHand(c);
  const body = c.createLinearGradient(0,-120,0,0);
  body.addColorStop(0,"#2a3a55"); body.addColorStop(1,"#0a1525");
  c.fillStyle = body;
  c.beginPath(); c.moveTo(-50,10); c.lineTo(50,10); c.lineTo(45,-120); c.lineTo(-45,-120); c.closePath(); c.fill();
  c.strokeStyle="#050a14"; c.lineWidth=2; c.stroke();
  for (let i = 0; i < 5; i++) { c.fillStyle="rgba(80,180,255,0.4)"; c.fillRect(-40,-90+i*14,80,4); }
  const flicker = 0.8 + Math.sin(game.bob*4)*0.2;
  const coreGrad = c.createRadialGradient(0,-60,2,0,-60,22);
  coreGrad.addColorStop(0, `rgba(255,255,255,${flicker})`);
  coreGrad.addColorStop(0.4, `rgba(120,200,255,${flicker})`);
  coreGrad.addColorStop(1, "rgba(40,80,255,0)");
  c.fillStyle = coreGrad; c.beginPath(); c.arc(0,-60,22,0,Math.PI*2); c.fill();
  c.fillStyle="#1a2540"; c.fillRect(-15,-160,30,50);
  c.strokeStyle="#050a14"; c.lineWidth=2; c.strokeRect(-15,-160,30,50);
  for (let i = 0; i < 3; i++) {
    const ringY = -120 - i*12;
    c.strokeStyle="#5cd6ff"; c.lineWidth=2;
    c.beginPath(); c.ellipse(0,ringY,18,4,0,0,Math.PI*2); c.stroke();
  }
  const muzz = c.createRadialGradient(0,-160,0,0,-160,14);
  muzz.addColorStop(0, "rgba(180,230,255,0.9)"); muzz.addColorStop(1, "rgba(40,80,255,0)");
  c.fillStyle = muzz; c.beginPath(); c.arc(0,-160,14,0,Math.PI*2); c.fill();
}

const MUZZLE_Y = {pistol:150, shotgun:170, chaingun:165, plasma:160};

function drawWeapon() {
  const cx = W/2, baseY = H;
  const bobX = Math.sin(game.bob)*5;
  const bobY = Math.abs(Math.cos(game.bob))*3;
  const kick = game.muzzleFlash * 18;
  const switchY = game.weaponSwitch * 220;
  const ox = cx + bobX, oy = baseY + bobY + kick + switchY;
  ctx.save();
  ctx.translate(ox, oy);
  if (game.weapon === "pistol") drawPistol(ctx);
  else if (game.weapon === "shotgun") drawShotgun(ctx);
  else if (game.weapon === "chaingun") drawChaingun(ctx);
  else drawPlasma(ctx);
  ctx.restore();

  if (game.muzzleFlash > 0.05) {
    const mY = oy - MUZZLE_Y[game.weapon];
    const isPlasma = game.weapon === "plasma";
    ctx.save();
    const r = 70 * game.muzzleFlash;
    const grad = ctx.createRadialGradient(ox, mY, 0, ox, mY, r);
    if (isPlasma) {
      grad.addColorStop(0, `rgba(220,240,255,${game.muzzleFlash})`);
      grad.addColorStop(0.4, `rgba(80,180,255,${game.muzzleFlash*0.8})`);
      grad.addColorStop(1, "rgba(40,80,255,0)");
    } else {
      grad.addColorStop(0, `rgba(255,250,220,${game.muzzleFlash})`);
      grad.addColorStop(0.4, `rgba(255,180,60,${game.muzzleFlash*0.8})`);
      grad.addColorStop(1, "rgba(255,60,10,0)");
    }
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(ox, mY, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = isPlasma
      ? `rgba(180,230,255,${game.muzzleFlash*0.9})`
      : `rgba(255,240,180,${game.muzzleFlash*0.9})`;
    ctx.beginPath();
    const spikes = 6;
    for (let i = 0; i < spikes*2; i++) {
      const ang = (i/(spikes*2))*Math.PI*2;
      const rad = (i % 2 === 0 ? 36 : 12) * game.muzzleFlash;
      const x = ox + Math.cos(ang)*rad, y = mY + Math.sin(ang)*rad;
      if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = isPlasma
      ? `rgba(120,180,255,${game.muzzleFlash*0.1})`
      : `rgba(255,200,120,${game.muzzleFlash*0.08})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function drawCrosshair() {
  const cx = (W/2)|0, cy = (H/2)|0;
  ctx.strokeStyle = "rgba(255,220,140,0.7)"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx-8, cy); ctx.lineTo(cx-3, cy);
  ctx.moveTo(cx+3, cy); ctx.lineTo(cx+8, cy);
  ctx.moveTo(cx, cy-8); ctx.lineTo(cx, cy-3);
  ctx.moveTo(cx, cy+3); ctx.lineTo(cx, cy+8);
  ctx.stroke();
}
function drawDamageVignette() {
  if (game.hitFlash <= 0.02) return;
  const grad = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.7);
  grad.addColorStop(0, "rgba(180,0,0,0)");
  grad.addColorStop(1, `rgba(180,0,0,${game.hitFlash*0.6})`);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
}
function drawMinimap() {
  const m = game.map;
  const scale = 5, ox = 12, oy = 12;
  const w = m.width*scale, h = m.height*scale;
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(ox-4, oy-4, w+8, h+8);
  for (let y = 0; y < m.height; y++) for (let x = 0; x < m.width; x++) {
    const c = m.grid[y][x];
    if (c > 0) {
      ctx.fillStyle = c === 4 ? "#7a1f15" : c === 3 ? "#8a8a95" : c === 2 ? "#9c4030" : "#7a6a55";
      ctx.fillRect(ox + x*scale, oy + y*scale, scale, scale);
    }
  }
  for (const e of game.enemies) {
    if (!e.alive) continue;
    ctx.fillStyle = "#ff3a1c"; ctx.fillRect(ox + e.x*scale - 1, oy + e.y*scale - 1, 3, 3);
  }
  for (const p of game.pickups) {
    if (p.taken) continue;
    let color = "#e0c84b";
    if (p.kind === "health") color = "#e6e6e6";
    else if (p.kind === "exit") color = "#5cd6ff";
    else if (p.kind === "shotgun") color = "#c08040";
    else if (p.kind === "chaingun") color = "#9090a0";
    else if (p.kind === "plasma") color = "#5cd6ff";
    ctx.fillStyle = color; ctx.fillRect(ox + p.x*scale - 1, oy + p.y*scale - 1, 2, 2);
  }
  ctx.fillStyle = "#ffeaa0";
  ctx.fillRect(ox + game.px*scale - 1.5, oy + game.py*scale - 1.5, 3, 3);
  ctx.strokeStyle = "#ffeaa0";
  ctx.beginPath();
  ctx.moveTo(ox + game.px*scale, oy + game.py*scale);
  ctx.lineTo(ox + (game.px + Math.cos(game.pa)*1.2)*scale, oy + (game.py + Math.sin(game.pa)*1.2)*scale);
  ctx.stroke();
  ctx.restore();
}

function render() {
  drawSkyAndFloor();
  castWalls();
  drawSprites();
  ctx.putImageData(img, 0, 0);
  drawWeapon();
  drawDamageVignette();
  drawCrosshair();
  drawMinimap();
}

// ============================================================
// HUD (DOM updates)
// ============================================================
const hpEl = document.getElementById("hp");
const ammoValEl = document.getElementById("ammoVal");
const killsEl = document.getElementById("kills");
const killMaxEl = document.getElementById("killMax");
const scoreEl = document.getElementById("score");
const lvlNumEl = document.getElementById("lvlNum");
const lvlNameEl = document.getElementById("lvlName");
const overlayEl = document.getElementById("overlay");
const oTitle = document.getElementById("oTitle");
const oSub = document.getElementById("oSub");
const oCtrls = document.getElementById("oCtrls");
const weaponBarEl = document.getElementById("weaponBar");

function buildWeaponBar() {
  weaponBarEl.innerHTML = "";
  const labels = {pistol:"PISTOL", shotgun:"SHOTGUN", chaingun:"CHAIN", plasma:"PLASMA"};
  WEAPON_ORDER.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "wslot";
    div.dataset.w = w;
    div.innerHTML = `<div class="k">${i+1}</div><div class="nm">${labels[w]}</div><div class="ammo">—</div>`;
    weaponBarEl.appendChild(div);
  });
}
buildWeaponBar();

function updateHUD() {
  hpEl.innerHTML = `${game.health}<span class="max"> / 100</span>`;
  ammoValEl.textContent = game.ammo[game.weapon];
  killsEl.innerHTML = `${game.kills}<span class="max" id="killMax"> / ${game.totalEnemies}</span>`;
  scoreEl.textContent = String(game.score).padStart(5, "0");
  lvlNumEl.textContent = game.level + 1;
  lvlNameEl.textContent = game.map.name;
  for (const div of weaponBarEl.children) {
    const w = div.dataset.w;
    div.classList.toggle("owned", game.owned[w]);
    div.classList.toggle("active", game.weapon === w);
    div.querySelector(".ammo").textContent = game.owned[w] ? game.ammo[w] : "—";
  }
  cv.classList.toggle("playing", game.status === "playing");
  if (game.status === "playing") {
    overlayEl.classList.add("hidden");
  } else {
    overlayEl.classList.remove("hidden");
    oCtrls.style.display = (game.status === "title") ? "" : "none";
    if (game.status === "title") {
      oTitle.textContent = "DOOM"; oTitle.style.color = "#e83a1c";
      oTitle.style.textShadow = "0 0 30px rgba(232,58,28,0.6), 4px 4px 0 #1a0000";
      oSub.textContent = "Press CLICK or ENTER to enter Hell";
    } else if (game.status === "dead") {
      oTitle.textContent = "YOU DIED"; oTitle.style.color = "#e83a1c";
      oTitle.style.textShadow = "0 0 30px rgba(232,58,28,0.6), 4px 4px 0 #1a0000";
      oSub.textContent = `You fell on level ${game.level + 1}: ${game.map.name}. Press ENTER to retry.`;
    } else if (game.status === "win") {
      oTitle.textContent = "VICTORY"; oTitle.style.color = "#f5a85c";
      oTitle.style.textShadow = "0 0 30px rgba(245,168,92,0.6), 4px 4px 0 #1a0000";
      oSub.textContent = `Hell purged across all ${TOTAL_LEVELS} levels. Final score: ${game.score}. Press ENTER to replay.`;
    } else if (game.status === "levelComplete") {
      oTitle.textContent = "LEVEL CLEAR"; oTitle.style.color = "#5cd6ff";
      oTitle.style.textShadow = "0 0 30px rgba(92,214,255,0.6), 4px 4px 0 #1a0000";
      oSub.textContent = `Onward to level ${game.level + 2}. Press ENTER or CLICK to continue.`;
    }
  }
}

// ============================================================
// INPUT
// ============================================================
const input = {forward:false, back:false, left:false, right:false, strafeLeft:false, strafeRight:false, shoot:false};
window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if (k === "w" || k === "arrowup") input.forward = true;
  else if (k === "s" || k === "arrowdown") input.back = true;
  else if (k === "arrowleft") input.left = true;
  else if (k === "arrowright") input.right = true;
  else if (k === "a") input.strafeLeft = true;
  else if (k === "d") input.strafeRight = true;
  else if (k === " " || k === "control") { input.shoot = true; e.preventDefault(); }
  else if (k === "1") switchWeapon("pistol");
  else if (k === "2") switchWeapon("shotgun");
  else if (k === "3") switchWeapon("chaingun");
  else if (k === "4") switchWeapon("plasma");
  else if (k === "q") cycleWeapon(-1);
  else if (k === "e") cycleWeapon(1);
  else if (k === "enter" && game.status !== "playing") { startGame(); unlockAudio(); }
});
window.addEventListener("keyup", e => {
  const k = e.key.toLowerCase();
  if (k === "w" || k === "arrowup") input.forward = false;
  else if (k === "s" || k === "arrowdown") input.back = false;
  else if (k === "arrowleft") input.left = false;
  else if (k === "arrowright") input.right = false;
  else if (k === "a") input.strafeLeft = false;
  else if (k === "d") input.strafeRight = false;
  else if (k === " " || k === "control") input.shoot = false;
});
window.addEventListener("mousedown", () => { input.shoot = true; unlockAudio(); });
window.addEventListener("mouseup", () => { input.shoot = false; });
window.addEventListener("mousemove", e => {
  if (document.pointerLockElement === cv) game.pa += e.movementX * 0.0025;
});
cv.addEventListener("click", () => {
  if (game.status !== "playing") startGame();
  if (cv.requestPointerLock) cv.requestPointerLock();
  unlockAudio();
});
cv.addEventListener("wheel", e => { e.preventDefault(); cycleWeapon(e.deltaY > 0 ? 1 : -1); }, {passive:false});

// ============================================================
// MAIN LOOP
// ============================================================
let last = performance.now();
function loop(t) {
  const dt = Math.min(0.05, (t - last) / 1000);
  last = t;
  update(dt, input);
  render();
  updateHUD();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
