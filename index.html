<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DOOM</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; color: #ffd27a; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; image-rendering: pixelated; }
  canvas { display: block; background: #000; border: 4px solid #2a0a0a; box-shadow: 0 0 60px rgba(200,30,10,0.4); cursor: crosshair; width: min(100vw, 1280px); height: min(100vh, 800px); }
  canvas.playing { cursor: none; }
  #hud { position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 24px; background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0)); pointer-events: none; text-shadow: 0 0 6px rgba(0,0,0,0.9); }
  #hud .row { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
  .stat { display: flex; flex-direction: column; }
  .stat .lbl { font-size: 10px; letter-spacing: 0.2em; opacity: 0.8; }
  .stat .val { font-size: 24px; font-weight: bold; font-variant-numeric: tabular-nums; }
  .stat .max { font-size: 12px; opacity: 0.6; }
  #weaponBar { display: flex; gap: 6px; }
  .wslot { padding: 4px 8px; border-radius: 3px; min-width: 64px; text-align: center; border: 1px solid rgba(255,210,122,0.25); background: rgba(0,0,0,0.4); opacity: 0.35; }
  .wslot.owned { opacity: 1; }
  .wslot.active { border: 2px solid #e83a1c; background: rgba(232,58,28,0.18); }
  .wslot .k { font-size: 10px; opacity: 0.7; }
  .wslot .nm { font-size: 10px; font-weight: bold; color: #a89060; }
  .wslot.active .nm { color: #ffd27a; }
  .wslot .ammo { font-size: 12px; color: #7a6648; font-variant-numeric: tabular-nums; }
  .wslot.owned .ammo { color: #ffd27a; }
  #banner { position: absolute; top: 0; right: 0; padding: 8px 16px; text-align: right; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0)); text-shadow: 0 0 6px rgba(0,0,0,0.9); }
  #banner .lvl { font-size: 11px; opacity: 0.7; }
  #banner .name { font-size: 14px; font-weight: bold; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(ellipse at center, rgba(40,5,5,0.7), rgba(0,0,0,0.95)); }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: clamp(40px, 10vw, 120px); font-weight: 900; margin: 0; color: #e83a1c; text-shadow: 0 0 30px rgba(232,58,28,0.6), 4px 4px 0 #1a0000; letter-spacing: 0.15em; }
  #overlay .sub { margin-top: 20px; font-size: 16px; max-width: 520px; padding: 0 16px; opacity: 0.9; }
  #overlay .ctrls { margin-top: 32px; font-size: 13px; line-height: 1.7; opacity: 0.8; }
  #overlay .ctrls .note { margin-top: 14px; opacity: 0.7; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="cv" width="640" height="400"></canvas>
    <div id="banner">
      <div class="lvl">LEVEL <span id="lvlNum">1</span> / 10</div>
      <div class="name" id="lvlName">E1M1: Hangar</div>
    </div>
    <div id="hud">
      <div class="row">
        <div class="stat"><div class="lbl">HEALTH</div><div class="val" id="hp" style="color:#e83a1c">100<span class="max"> / 100</span></div></div>
        <div class="stat"><div class="lbl">AMMO</div><div class="val" id="ammoVal">30</div></div>
        <div id="weaponBar"></div>
        <div class="stat"><div class="lbl">KILLS</div><div class="val" id="kills" style="color:#f5a85c">0<span class="max" id="killMax"> / 0</span></div></div>
        <div class="stat" style="align-items:flex-end"><div class="lbl">SCORE</div><div class="val" id="score">00000</div></div>
      </div>
    </div>
    <div id="overlay">
      <h1 id="oTitle">DOOM</h1>
      <div class="sub" id="oSub">Press CLICK or ENTER to enter Hell</div>
      <div class="ctrls" id="oCtrls">
        <div>WASD / ARROWS &mdash; move &amp; turn</div>
        <div>MOUSE &mdash; look (click to lock cursor)</div>
        <div>SPACE / CLICK &mdash; shoot</div>
        <div>1 2 3 4 / Q E / SCROLL &mdash; switch weapon</div>
        <div class="note">10 levels. Kill every demon, then reach the blue portal.</div>
      </div>
    </div>
  </div>
</div>

function parseMap(name, raw) {
  const h = raw.length, w = raw[0].length;
  const grid = []; let playerStart = {x:1.5,y:1.5};
  const enemySpawns=[], ammoSpawns=[], healthSpawns=[], weaponSpawns=[];
  let exit = {x:1.5,y:1.5};
  for (let y=0;y<h;y++){const row=[];for (let x=0;x<w;x++){const c=raw[y][x],cx=x+0.5,cy=y+0.5;
    switch(c){case "1":row.push(1);break;case "2":row.push(2);break;case "3":row.push(3);break;case "4":row.push(4);break;
    case "P":playerStart={x:cx,y:cy};row.push(0);break;case "E":enemySpawns.push({x:cx,y:cy});row.push(0);break;
    case "A":ammoSpawns.push({x:cx,y:cy});row.push(0);break;case "H":healthSpawns.push({x:cx,y:cy});row.push(0);break;
    case "S":weaponSpawns.push({x:cx,y:cy,kind:"shotgun"});row.push(0);break;
    case "C":weaponSpawns.push({x:cx,y:cy,kind:"chaingun"});row.push(0);break;
    case "L":weaponSpawns.push({x:cx,y:cy,kind:"plasma"});row.push(0);break;
    case "X":exit={x:cx,y:cy};row.push(0);break;default:row.push(0);}}grid.push(row);}
  return {grid,width:w,height:h,playerStart,enemySpawns,ammoSpawns,healthSpawns,weaponSpawns,exit,name};
}

const TEX = 64;
function rgba(r,g,b,a=255){return ((a&255)<<24)|((b&255)<<16)|((g&255)<<8)|(r&255);}
function makeStone(){const d=new Uint32Array(TEX*TEX);for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++){const n=(Math.sin(x*0.4)+Math.cos(y*0.3))*8+(Math.random()*16-8);const b=110+n;d[y*TEX+x]=rgba(b,b*0.92,b*0.78);}for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++)if((y%16===0)||(x%16===0&&(y%32<16)))d[y*TEX+x]=rgba(60,50,40);return{size:TEX,data:d};}
function makeBrick(){const d=new Uint32Array(TEX*TEX);for(let i=0;i<TEX*TEX;i++){const v=130+Math.random()*30-15;d[i]=rgba(v,v*0.45,v*0.3);}for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++){const off=(Math.floor(y/16)%2)*16;if(y%16===0||(x+off)%32===0)d[y*TEX+x]=rgba(40,18,12);}return{size:TEX,data:d};}
function makeMetal(){const d=new Uint32Array(TEX*TEX);for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++){const v=90+Math.sin(x*0.6+y*0.3)*15+Math.random()*10;d[y*TEX+x]=rgba(v*0.85,v*0.9,v*1.1);}for(let y=4;y<TEX;y+=16)for(let x=4;x<TEX;x+=16){d[y*TEX+x]=rgba(40,40,55);d[y*TEX+x+1]=rgba(220,220,230);}for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++)if(y%32===0||x%32===0)d[y*TEX+x]=rgba(40,45,55);return{size:TEX,data:d};}
function makeHell(){const d=new Uint32Array(TEX*TEX);for(let y=0;y<TEX;y++)for(let x=0;x<TEX;x++){const v=90+Math.sin(x*0.2)*Math.cos(y*0.25)*30+Math.random()*20;d[y*TEX+x]=rgba(v*1.4,v*0.3,v*0.2);}for(let i=0;i<80;i++){const x=(Math.random()*TEX)|0;const len=5+(Math.random()*20)|0;const ys=(Math.random()*(TEX-len))|0;for(let k=0;k<len;k++)d[(ys+k)*TEX+x]=rgba(160,20,10);}return{size:TEX,data:d};}
const WALL_TEX = [null,makeStone(),makeBrick(),makeMetal(),makeHell()];

const SPR=64;
function makeImp(){const d=new Uint32Array(SPR*SPR);d.fill(0);
 for(let y=24;y<56;y++)for(let x=18;x<46;x++){const n=Math.random()*30-15;d[y*SPR+x]=rgba(120+n,50+n*0.5,30+n*0.3);}
 for(let y=8;y<28;y++)for(let x=22;x<42;x++){const dx=x-32,dy=y-18;if(dx*dx+dy*dy<100)d[y*SPR+x]=rgba(140,60,35);}
 d[16*SPR+27]=rgba(255,220,80);d[16*SPR+28]=rgba(255,220,80);d[16*SPR+35]=rgba(255,220,80);d[16*SPR+36]=rgba(255,220,80);
 d[17*SPR+27]=rgba(255,255,140);d[17*SPR+36]=rgba(255,255,140);
 for(let x=27;x<=36;x++)d[24*SPR+x]=rgba(20,5,5);
 for(let x=28;x<36;x+=2)d[23*SPR+x]=rgba(240,240,240);
 for(let k=0;k<5;k++){d[(8-k)*SPR+24-k]=rgba(60,30,20);d[(8-k)*SPR+40+k]=rgba(60,30,20);}
 for(let y=28;y<50;y++){d[y*SPR+14]=rgba(120,50,30);d[y*SPR+15]=rgba(120,50,30);d[y*SPR+48]=rgba(120,50,30);d[y*SPR+49]=rgba(120,50,30);}
 for(let k=0;k<3;k++){d[50*SPR+12+k]=rgba(220,220,220);d[50*SPR+50+k]=rgba(220,220,220);}
 for(let y=50;y<60;y++){for(let x=22;x<28;x++)d[y*SPR+x]=rgba(110,45,28);for(let x=36;x<42;x++)d[y*SPR+x]=rgba(110,45,28);}
 return{size:SPR,data:d};}
function makeAmmo(){const d=new Uint32Array(SPR*SPR);d.fill(0);
 for(let y=28;y<44;y++)for(let x=18;x<46;x++)d[y*SPR+x]=rgba(180,150,40);
 for(let x=18;x<46;x++){d[28*SPR+x]=rgba(240,210,80);d[43*SPR+x]=rgba(110,90,20);}
 for(let y=28;y<44;y++){d[y*SPR+18]=rgba(110,90,20);d[y*SPR+45]=rgba(110,90,20);}
 for(let i=0;i<4;i++){const cx=22+i*6;for(let y=22;y<30;y++)d[y*SPR+cx]=rgba(220,200,120);d[21*SPR+cx]=rgba(255,240,160);}
 return{size:SPR,data:d};}
function makeHealth(){const d=new Uint32Array(SPR*SPR);d.fill(0);
 for(let y=26;y<46;y++)for(let x=22;x<42;x++)d[y*SPR+x]=rgba(230,230,230);
 for(let x=22;x<42;x++){d[26*SPR+x]=rgba(180,180,180);d[45*SPR+x]=rgba(140,140,140);}
 for(let y=28;y<44;y++)for(let x=30;x<34;x++)d[y*SPR+x]=rgba(220,40,30);
 for(let y=32;y<38;y++)for(let x=24;x<40;x++)d[y*SPR+x]=rgba(220,40,30);
 return{size:SPR,data:d};}
function makeExit(){const d=new Uint32Array(SPR*SPR);d.fill(0);
 for(let y=8;y<60;y++)for(let x=16;x<48;x++){const dx=x-32,dy=y-34;const r=Math.sqrt(dx*dx+dy*dy*0.7);if(r<22){const t=1-r/22;d[y*SPR+x]=rgba(80*t+20,180*t+30,255*t+40);}}
 for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2,r=Math.random()*18;const x=(32+Math.cos(a)*r)|0,y=(34+Math.sin(a)*r*0.7)|0;d[y*SPR+x]=rgba(220,240,255);}
 return{size:SPR,data:d};}

 for(let x=24;x<54;x++)d[28*SPR+x]=rgba(Math.min(255,barrel[0]+60),Math.min(255,barrel[1]+60),Math.min(255,barrel[2]+60));
 d[26*SPR+50]=rgba(40,40,40);d[26*SPR+51]=rgba(40,40,40);
 return{size:SPR,data:d};}
const IMP_TEX=makeImp(),AMMO_TEX=makeAmmo(),HEALTH_TEX=makeHealth(),EXIT_TEX=makeExit();
const SHOTGUN_PICKUP=makeWeaponPickup([90,90,100],[120,70,30]);

let audioCtx=null;
function unlockAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(audioCtx&&audioCtx.state==="suspended")audioCtx.resume();}
function blip(freq,dur,type,vol){if(!audioCtx)return;const t0=audioCtx.currentTime;const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=type||"square";o.frequency.setValueAtTime(freq,t0);g.gain.setValueAtTime(vol||0.15,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);o.connect(g).connect(audioCtx.destination);o.start(t0);o.stop(t0+dur);}
function noise(dur,vol){if(!audioCtx)return;const t0=audioCtx.currentTime;const sr=audioCtx.sampleRate;const buf=audioCtx.createBuffer(1,sr*dur,sr);const dat=buf.getChannelData(0);for(let i=0;i<dat.length;i++)dat[i]=(Math.random()*2-1)*(1-i/dat.length);const src=audioCtx.createBufferSource();src.buffer=buf;const g=audioCtx.createGain();g.gain.value=vol||0.2;src.connect(g).connect(audioCtx.destination);src.start(t0);}
function playShot(){noise(0.12,0.25);blip(180,0.08,"square",0.18);}
function playHit(){blip(140,0.05,"sawtooth",0.08);}
function playEnemyHit(){blip(220,0.1,"square",0.14);blip(120,0.12,"sawtooth",0.1);}
function playPickup(){blip(660,0.08,"square",0.18);blip(990,0.1,"square",0.14);}
function playEmpty(){blip(80,0.05,"square",0.1);}
function playPain(){blip(220,0.18,"sawtooth",0.18);blip(120,0.22,"sawtooth",0.12);}

const ctx=cv.getContext("2d",{alpha:false});
const img=ctx.createImageData(W,H);

function spawnEntities(){const m=game.map;

function loadLevel(i){game.level=i;game.map=MAPS[i];game.px=game.map.playerStart.x;game.py=game.map.playerStart.y;game.pa=0;spawnEntities();}
function reset(){game.status="playing";game.health=100;game.ammo={pistol:50,shotgun:0,chaingun:0,plasma:0};game.owned={pistol:true,shotgun:false,chaingun:false,plasma:false};game.weapon="pistol";game.score=0;loadLevel(0);}
function advanceLevel(){if(game.level+1>=TOTAL_LEVELS){game.status="win";return;}loadLevel(game.level+1);game.status="playing";game.health=Math.min(100,game.health+15);}
function startGame(){if(game.status==="levelComplete"){advanceLevel();return;}reset();}
function switchWeapon(w){if(!game.owned[w]||game.weapon===w)return;game.weapon=w;game.weaponSwitch=1;}
function cycleWeapon(d){const o=WEAPON_ORDER.filter(w=>game.owned[w]);if(o.length<=1)return;const i=o.indexOf(game.weapon);switchWeapon(o[(i+d+o.length)%o.length]);}
